    fill="currentColor"
    d="
      M 19 44.5
      L 19 19.5
      L 28.75 19.5
      L 32 25.5
      L 35.25 19.5
      L 45 19.5
      L 45 44.5
      L 39 44.5
      L 39 30.5
      L 34.5 39
      L 29.5 39
      L 25 30.5
      L 25 44.5
